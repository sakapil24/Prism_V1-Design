<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalog — Prism · Indian VCs</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ───────────────────────────── Tokens (Charcoal × Airbnb) ───────────────────────────── */
  :root {
    --brand-red: #D21905;
    --brand-charcoal: #191816;
    --brand-cocoa: #301008;
    --brand-pearl: #F8F8EE;
    --brand-clay-dark: #810100;
    --brand-clay-light: #AB342B;

    --n-0: #FFFFFF; --n-50: #F8F9FB; --n-100: #EFF1F4; --n-200: #E1E4E9;
    --n-300: #C5CAD2; --n-400: #969CA6; --n-500: #6A707A; --n-600: #4A4F58;
    --n-700: #30343B; --n-800: #20232A; --n-900: #191816;

    --bg-canvas:  #F5F6F8;
    --bg-surface: #FFFFFF;
    --bg-subtle:  #EFF1F4;
    --bg-muted:   #F8F9FB;

    --text-primary:   var(--brand-charcoal);
    --text-secondary: var(--n-700);
    --text-muted:     var(--n-500);
    --text-faint:     var(--n-400);

    --border-subtle:  var(--n-200);
    --border-default: var(--n-300);
    --border-strong:  var(--n-700);
    --divider:        var(--n-200);

    /* Charcoal variant: primary CTA is Charcoal, not Clay Red. */
    --cta-primary-bg:       var(--brand-charcoal);
    --cta-primary-bg-hover: #2B2825;
    --cta-primary-fg:       var(--brand-pearl);

    /* Brand red is reserved for The Link motif only. */
    --link-bar:   var(--brand-red);
    --focus-ring: var(--brand-red);

    --st-success-fg: #1F8056; --st-success-bg: #E4F1EC; --st-success-bd: #A8D2BD;
    --st-warning-fg: #B27316; --st-warning-bg: #F8EDD2; --st-warning-bd: #E0C285;
    --st-info-fg:    #2D5DA0; --st-info-bg:    #E1ECF7; --st-info-bd:    #B0C8E2;
    --st-error-fg:   #D21905; --st-error-bg:   #FBE5E1; --st-error-bd:   #F1B7AE;

    --elev-1: 0 1px 2px 0 rgba(25,24,22,0.06);
    --elev-2: 0 2px 8px -2px rgba(25,24,22,0.08), 0 1px 2px 0 rgba(25,24,22,0.04);
    --elev-3: 0 8px 24px -8px rgba(25,24,22,0.12), 0 2px 6px -2px rgba(25,24,22,0.06);
    --elev-4: 0 24px 48px -16px rgba(25,24,22,0.18), 0 4px 12px -4px rgba(25,24,22,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    color: var(--text-primary);
    font-family: 'Manrope', 'Switzer', 'DM Sans', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding: 32px 24px 96px;
  }
  ::selection { background: rgba(25, 24, 22, 0.10); }
  a { color: var(--brand-clay-light); text-decoration: none; }
  a:hover { color: var(--brand-clay-dark); }

  .container { max-width: 1320px; margin: 0 auto; }

  /* ───────────────────────────── Page hero (section anchor) ───────────────────────────── */
  .page-hero { margin-bottom: 28px; }
  .anchor-bar { width: 48px; height: 3px; background: var(--link-bar); margin-bottom: 18px; border-radius: 1px; }
  .page-hero h1 {
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    font-weight: 400; font-size: 40px; line-height: 1.05;
    letter-spacing: -0.015em;
    margin: 0 0 8px;
  }
  .page-hero .subtitle {
    color: var(--text-muted);
    font-size: 14.5px;
    margin: 0;
    max-width: 720px;
  }

  /* ───────────────────────────── Sub-nav tabs (Explore / Categories / Vendors / Saved) ───────────────────────────── */
  .subnav {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--divider);
    margin: 24px 0 24px;
  }
  .subnav-tab {
    padding: 12px 16px;
    font-size: 13.5px; font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    background: transparent;
    border: 0;
    font-family: inherit;
    transition: color 150ms;
  }
  .subnav-tab:hover { color: var(--text-primary); }
  .subnav-tab.active { color: var(--text-primary); }
  .subnav-tab.active::after {
    content: ""; position: absolute;
    left: 16px; right: 16px; bottom: -1px;
    height: 2px;
    background: var(--link-bar);
  }
  .subnav-tab .count {
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: 8px;
    min-width: 18px; height: 18px;
    padding: 0 5px;
    background: var(--bg-subtle);
    color: var(--text-muted);
    border-radius: 999px;
    font-size: 11px; font-weight: 500;
  }
  .subnav-tab.active .count { background: rgba(25,24,22,0.08); color: var(--text-primary); }

  /* ───────────────────────────── Toolbar (search + filters + view toggle) ───────────────────────────── */
  .toolbar {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .search-input-group { position: relative; flex: 1; min-width: 280px; max-width: 480px; }
  .search-input-group .leading {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); display: flex; pointer-events: none;
  }
  .search-input-group .leading svg { width: 16px; height: 16px; fill: currentColor; }
  .search-input {
    height: 40px;
    width: 100%;
    padding: 0 14px 0 40px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 8px;
    color: var(--text-primary);
    font: inherit; font-size: 14px;
    outline: none;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .search-input::placeholder { color: var(--text-faint); }
  .search-input:focus {
    border-color: var(--focus-ring);
    border-width: 2px;
    padding: 0 13px 0 39px;
  }

  .filter-select-wrap { position: relative; }
  .filter-select {
    appearance: none; -webkit-appearance: none;
    height: 40px;
    padding: 0 32px 0 14px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 8px;
    color: var(--text-primary);
    font: inherit; font-size: 13.5px;
    cursor: pointer;
    outline: none;
  }
  .filter-select.has-value { background: rgba(25, 24, 22, 0.04); border-color: var(--border-strong); font-weight: 500; }
  .filter-select-wrap::after {
    content: ""; position: absolute; right: 14px; top: 50%;
    width: 8px; height: 8px;
    border-right: 1.5px solid var(--text-muted);
    border-bottom: 1.5px solid var(--text-muted);
    transform: translateY(-75%) rotate(45deg);
    pointer-events: none;
  }
  .filter-select:focus { border-color: var(--focus-ring); border-width: 2px; padding: 0 31px 0 13px; }

  .view-toggle {
    display: inline-flex; gap: 2px;
    background: var(--bg-subtle);
    border-radius: 8px;
    padding: 3px;
    margin-left: auto;
  }
  .view-toggle button {
    border: 0; background: transparent;
    width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    border-radius: 6px; cursor: pointer;
    transition: background 150ms, color 150ms;
  }
  .view-toggle button:hover { color: var(--text-primary); }
  .view-toggle button.active { background: var(--bg-surface); color: var(--text-primary); box-shadow: var(--elev-1); }
  .view-toggle button svg { width: 14px; height: 14px; fill: currentColor; }

  .active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; align-items: center; }
  .active-filters .lab { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 28px;
    padding: 0 6px 0 12px;
    background: rgba(25, 24, 22, 0.06);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    color: var(--text-primary);
    border: 0;
    font-family: inherit;
    cursor: default;
  }
  .filter-chip .x {
    width: 18px; height: 18px;
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    border: 0; padding: 0;
  }
  .filter-chip .x:hover { background: rgba(25, 24, 22, 0.10); color: var(--text-primary); }
  .filter-chip .x svg { width: 9px; height: 9px; fill: currentColor; }
  .clear-all-btn {
    background: transparent; border: 0;
    font: inherit; font-size: 12px; font-weight: 500;
    color: var(--brand-clay-light);
    cursor: pointer;
    padding: 4px 6px;
  }
  .clear-all-btn:hover { color: var(--brand-clay-dark); }

  /* ───────────────────────────── Product grid ───────────────────────────── */
  .results-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
  .results-meta strong { color: var(--text-primary); font-weight: 600; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  @media (max-width: 1200px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
  @media (max-width: 900px)  { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }
  @media (max-width: 600px)  { .product-grid { grid-template-columns: 1fr; } }

  .prod-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 220ms cubic-bezier(0.2, 0, 0, 1), transform 220ms cubic-bezier(0.2, 0, 0, 1), border-color 220ms;
    display: flex; flex-direction: column;
    position: relative;
  }
  .prod-card:hover {
    box-shadow: var(--elev-3);
    transform: translateY(-2px);
    border-color: var(--border-default);
  }
  .prod-card .cover {
    aspect-ratio: 16 / 10;
    background: var(--bg-subtle);
    position: relative;
    overflow: hidden;
  }
  .prod-card .cover img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 320ms cubic-bezier(0.2, 0, 0, 1);
  }
  .prod-card:hover .cover img { transform: scale(1.03); }
  .prod-card .logo-chip {
    position: absolute; top: 12px; left: 12px;
    width: 36px; height: 36px;
    background: var(--bg-surface);
    border-radius: 8px;
    box-shadow: var(--elev-2);
    display: flex; align-items: center; justify-content: center;
    padding: 5px;
  }
  .prod-card .logo-chip img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }
  .prod-card .logo-chip .fallback {
    font-size: 12px; font-weight: 700; color: var(--text-primary);
  }
  .prod-card .save-btn {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(25,24,22,0.06);
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-primary);
    transition: background 150ms;
    padding: 0;
  }
  .prod-card .save-btn:hover { background: rgba(255,255,255,1); }
  .prod-card .save-btn svg { width: 15px; height: 15px; fill: currentColor; }
  .prod-card .save-btn.saved { background: var(--brand-charcoal); color: var(--brand-pearl); border-color: var(--brand-charcoal); }
  .prod-card .save-btn.saved:hover { background: var(--brand-charcoal); }

  .prod-card .body {
    padding: 14px 16px 8px;
    display: flex; flex-direction: column; gap: 6px;
    flex: 1;
  }
  .prod-card .vendor-line {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted); font-weight: 500;
  }
  .prod-card .name {
    font-size: 15.5px; font-weight: 600;
    margin: 0;
    letter-spacing: -0.005em;
    line-height: 1.3;
  }
  .prod-card .desc {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.45;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .prod-card .foot {
    padding: 10px 16px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .prod-card .deal-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: var(--bg-subtle);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    color: var(--text-primary);
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .prod-card .deal-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--st-success-fg); flex: none; }
  .prod-card .deal-pill.in-listings .dot { background: var(--brand-charcoal); }
  .prod-card .in-listings-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px;
    background: var(--brand-charcoal); color: var(--brand-pearl);
    border-radius: 999px;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .prod-card .in-listings-tag svg { width: 10px; height: 10px; fill: currentColor; }

  /* ───────────────────────────── Product list view ───────────────────────────── */
  .product-list { display: flex; flex-direction: column; gap: 8px; }
  .prod-row {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    cursor: pointer;
    transition: box-shadow 220ms, border-color 220ms;
  }
  .prod-row:hover { box-shadow: var(--elev-1); border-color: var(--border-default); }
  .prod-row .lo {
    width: 48px; height: 48px;
    border-radius: 10px;
    background: var(--bg-subtle);
    flex: none;
    display: flex; align-items: center; justify-content: center;
    padding: 6px;
  }
  .prod-row .lo img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .prod-row .lo .fallback { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .prod-row .main { flex: 1; min-width: 0; }
  .prod-row .main .v { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .prod-row .main .n { font-size: 15px; font-weight: 600; margin: 1px 0 3px; letter-spacing: -0.005em; }
  .prod-row .main .d { font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .prod-row .deal-meta { font-size: 12.5px; color: var(--text-primary); flex: none; min-width: 180px; max-width: 220px; }
  .prod-row .deal-meta .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--st-success-fg); margin-right: 6px; vertical-align: middle; }
  .prod-row .acts { display: flex; gap: 6px; flex: none; }

  /* ───────────────────────────── Category grid ───────────────────────────── */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 1100px) { .cat-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 700px)  { .cat-grid { grid-template-columns: repeat(2, 1fr); } }
  .cat-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 14px;
    min-height: 148px;
    transition: box-shadow 220ms, transform 220ms, border-color 220ms;
    font-family: inherit;
    text-align: left;
  }
  .cat-card:hover { box-shadow: var(--elev-2); transform: translateY(-2px); border-color: var(--border-default); }
  .cat-card .ic {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bg-subtle);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-primary);
  }
  .cat-card .ic svg { width: 20px; height: 20px; fill: currentColor; }
  .cat-card .name { font-size: 16px; font-weight: 600; letter-spacing: -0.005em; line-height: 1.3; }
  .cat-card .count { font-size: 12.5px; color: var(--text-muted); margin-top: auto; font-weight: 500; }

  /* ───────────────────────────── Vendor grid ───────────────────────────── */
  .vendor-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 1000px) { .vendor-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .vendor-grid { grid-template-columns: 1fr; } }
  .vendor-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    padding: 18px;
    display: flex; gap: 16px;
    cursor: pointer;
    transition: box-shadow 220ms, border-color 220ms;
    align-items: flex-start;
  }
  .vendor-card:hover { box-shadow: var(--elev-2); border-color: var(--border-default); }
  .vendor-card .vlogo {
    width: 52px; height: 52px;
    border-radius: 10px;
    background: var(--bg-subtle);
    display: flex; align-items: center; justify-content: center;
    padding: 7px;
    flex: none;
  }
  .vendor-card .vlogo img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .vendor-card .vlogo .fallback { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .vendor-card .info { flex: 1; min-width: 0; }
  .vendor-card .vn { font-size: 16px; font-weight: 600; letter-spacing: -0.005em; margin: 0; }
  .vendor-card .vd { font-size: 13px; color: var(--text-secondary); margin: 4px 0 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .vendor-card .vmeta { display: flex; gap: 10px; margin-top: 10px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .vendor-card .vmeta .dot { width: 3px; height: 3px; background: var(--n-400); border-radius: 50%; align-self: center; }

  /* ───────────────────────────── Detail pages ───────────────────────────── */
  .crumb { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); margin-bottom: 14px; flex-wrap: wrap; line-height: 1; }
  .crumb a, .crumb button {
    color: var(--text-muted);
    background: none; border: 0; padding: 0;
    font: inherit; font-size: 12px;
    cursor: pointer;
    line-height: 1;
  }
  .crumb a:hover, .crumb button:hover { color: var(--text-primary); }
  .crumb .cur { color: var(--text-primary); font-weight: 500; }
  .crumb .sep { display: inline-flex; align-items: center; color: var(--text-faint); }
  .crumb .sep svg { width: 10px; height: 10px; fill: currentColor; display: block; }

  .detail {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--elev-1);
  }
  .detail-hero {
    padding: 32px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 36px;
    align-items: flex-start;
  }
  @media (max-width: 900px) {
    .detail-hero { grid-template-columns: 1fr; gap: 24px; padding: 24px; }
    .detail-hero .cover { width: 100%; max-width: none; }
  }
  .detail-hero .cover {
    width: 100%;
    aspect-ratio: 16/10;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg-subtle);
    border: 1px solid var(--border-subtle);
  }
  .detail-hero .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-hero .meta-block { display: flex; flex-direction: column; gap: 14px; }
  .vendor-link-row {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent; border: 0; padding: 4px 0;
    font: inherit; cursor: pointer;
    color: var(--text-secondary);
    align-self: flex-start;
  }
  .vendor-link-row:hover { color: var(--text-primary); }
  .vendor-link-row .vlg {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    padding: 3px;
    display: flex; align-items: center; justify-content: center;
  }
  .vendor-link-row .vlg img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .vendor-link-row .vlg .fallback { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .vendor-link-row .vn { font-size: 14px; font-weight: 500; }
  .vendor-link-row .arrow { width: 11px; height: 11px; fill: currentColor; opacity: 0; transition: opacity 150ms, transform 150ms; }
  .vendor-link-row:hover .arrow { opacity: 1; transform: translateX(2px); }
  .detail-title {
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    font-weight: 400;
    font-size: 36px; line-height: 1.1;
    letter-spacing: -0.015em;
    margin: 0;
  }
  .detail-desc {
    font-size: 16px; line-height: 1.55;
    color: var(--text-secondary);
    margin: 0;
    max-width: 620px;
  }
  .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  .detail-body {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 40px;
    padding: 32px;
    border-top: 1px solid var(--divider);
    background: var(--bg-muted);
  }
  @media (max-width: 900px) {
    .detail-body { grid-template-columns: 1fr; padding: 24px; gap: 28px; }
  }
  .detail-main section + section { margin-top: 32px; }
  .detail-main h3 {
    font-size: 14px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 0 0 14px;
  }
  .detail-main h3::before {
    content: ""; display: inline-block;
    width: 16px; height: 2px; background: var(--link-bar);
    vertical-align: middle; margin-right: 10px;
  }
  .detail-main .long-desc {
    font-size: 15px; line-height: 1.6;
    color: var(--text-primary);
    margin: 0;
    white-space: pre-line;
  }

  /* Deal card */
  .deal-card {
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    background: var(--bg-surface);
    padding: 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .deal-card + .deal-card { margin-top: 10px; }
  .deal-card .dt-row { display: flex; align-items: flex-start; gap: 12px; justify-content: space-between; }
  .deal-card .dt { font-size: 15px; font-weight: 600; letter-spacing: -0.005em; line-height: 1.3; }
  .deal-card .dod { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; margin: 0; }
  .deal-card .dmeta {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px 18px;
    padding-top: 12px;
    border-top: 1px solid var(--divider);
    font-size: 12.5px;
  }
  .deal-card .dmeta .item { display: flex; flex-direction: column; gap: 2px; }
  .deal-card .dmeta .k { color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .deal-card .dmeta .v { color: var(--text-primary); font-weight: 500; }
  .deal-status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    background: var(--st-success-bg);
    color: var(--st-success-fg);
    border: 1px solid var(--st-success-bd);
    border-radius: 999px;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
    flex: none;
  }
  .deal-status-pill.expired {
    background: var(--st-neutral-bg, var(--bg-subtle));
    color: var(--text-muted);
    border-color: var(--border-default);
  }

  /* Screenshot gallery */
  .screenshots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 700px) { .screenshots { grid-template-columns: 1fr; } }
  .screenshots img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid var(--border-subtle);
    background: var(--bg-subtle);
  }

  /* Tag row */
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    display: inline-flex; align-items: center;
    padding: 4px 11px;
    border-radius: 999px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-subtle);
    font-size: 12px; color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: background 150ms, color 150ms;
  }
  .tag:hover { background: rgba(25, 24, 22, 0.08); color: var(--text-primary); }
  .tag.cat { font-weight: 500; color: var(--text-primary); }

  /* Detail aside */
  .detail-aside { display: flex; flex-direction: column; gap: 14px; }
  .aside-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    padding: 18px;
  }
  .aside-card h4 {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 0 0 12px;
  }
  .aside-card .kv-row { display: flex; justify-content: space-between; padding: 6px 0; border-top: 1px solid var(--divider); font-size: 13px; }
  .aside-card .kv-row:first-of-type { border-top: 0; padding-top: 0; }
  .aside-card .kv-row .k { color: var(--text-muted); }
  .aside-card .kv-row .v { color: var(--text-primary); font-weight: 500; }
  .aside-card .vendor-mini { display: flex; gap: 12px; align-items: center; cursor: pointer; }
  .aside-card .vendor-mini .vlg { width: 40px; height: 40px; border-radius: 8px; background: var(--bg-subtle); display: flex; align-items: center; justify-content: center; padding: 5px; flex: none; }
  .aside-card .vendor-mini .vlg img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .aside-card .vendor-mini .vname { font-size: 14px; font-weight: 600; }
  .aside-card .vendor-mini .vdesc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .external-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--brand-clay-light);
  }
  .external-link:hover { color: var(--brand-clay-dark); }
  .external-link svg { width: 12px; height: 12px; fill: currentColor; }

  /* ───────────────────────────── Buttons ───────────────────────────── */
  .btn {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    padding: 0 14px;
    height: 36px;
    font: inherit; font-weight: 500; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.08em;
    border-radius: 8px; border: 0;
    cursor: pointer;
    transition: background 150ms, color 150ms, opacity 150ms, transform 80ms;
    white-space: nowrap; user-select: none;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
  .btn.primary {
    background: var(--cta-primary-bg);
    color: var(--cta-primary-fg);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.10), 0 2px 4px -2px rgba(25,24,22,0.20), 0 3px 6px -2px rgba(25,24,22,0.10);
  }
  .btn.primary:hover { background: var(--cta-primary-bg-hover); }
  .btn.secondary {
    background: var(--bg-surface);
    color: var(--text-primary);
    box-shadow: inset 0 0 0 1px var(--border-default);
  }
  .btn.secondary:hover { background: var(--bg-subtle); }
  .btn.ghost { background: transparent; color: var(--text-secondary); }
  .btn.ghost:hover { background: var(--bg-subtle); color: var(--text-primary); }
  .btn.sm { height: 30px; padding: 0 12px; font-size: 12px; border-radius: 6px; }
  .btn.icon-only { width: 36px; padding: 0; }
  .btn.icon-only.sm { width: 30px; }
  .btn svg { width: 14px; height: 14px; fill: currentColor; flex: none; }
  .btn:disabled, .btn.is-disabled { opacity: 0.55; cursor: not-allowed; }

  .empty {

  #toast-host {

    pointer-events: none;

    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 12px 14px;

  @keyframes toast-out {

    width: 18px; height: 18px;

    background: var(--st-success-bg);
    color: var(--st-success-fg);
    display: flex; align-items: center; justify-content: center;

  .toast .ic svg { width: 11px; height: 11px; fill: currentColor; }

  .toast .x svg { width: 12px; height: 12px; fill: currentColor; }

  .skel {
    background: linear-gradient(90deg, #EFF1F4 25%, #F8F9FB 50%, #EFF1F4 75%);

/* ───────────────────────────── HELPERS ───────────────────────────── */
const $ = (sel, root) => (root || document).querySelector(sel);
const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));
const escape = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byId = (arr, id) => arr.find(x => x.id === id);
const productsByVendor = (vid) => PRODUCTS.filter(p => p.vendorId === vid);
const dealsByProduct  = (pid) => DEALS.filter(d => d.productId === pid);
const dealsByVendor   = (vid) => DEALS.filter(d => productsByVendor(vid).some(p => p.id === d.productId));
const vendorOf = (p) => byId(VENDORS, p.vendorId);
const catName = (id) => (byId(CATEGORIES, id) || { name: id }).name;
const logoUrl  = (domain) => `https://logos.hunter.io/${domain}`;
const coverUrl = (id) => `https://picsum.photos/seed/prism-${id}/720/450`;

const formatDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const headlineDeal = (productId) => {
  const ds = dealsByProduct(productId);
  return ds[0] || null;
};

const icon = (id) => `<svg aria-hidden="true"><use href="#${id}"/></svg>`;

/* ───────────────────────────── STATE + PERSISTENCE ───────────────────────────── */
const LS_SAVED = 'prism-catalog-saved';
const LS_LISTINGS = 'prism-catalog-listings';

function loadSet(key) {
  try { return new Set(JSON.parse(localStorage.getItem(key)) || []); }
  catch { return new Set(); }
}
function saveSet(key, set) {
  try { localStorage.setItem(key, JSON.stringify(Array.from(set))); } catch {}
}

const state = {
  saved: loadSet(LS_SAVED),
  inListings: loadSet(LS_LISTINGS),
  search: '',
  filterCategory: '',
  filterStage: '',
  filterRegion: '',
  view: 'grid', // grid | list
};

function setSaved(productId, value) {
  if (value) state.saved.add(productId); else state.saved.delete(productId);
  saveSet(LS_SAVED, state.saved);
  updateSavedCount();
}
function setInListings(productId) {
  state.inListings.add(productId);
  saveSet(LS_LISTINGS, state.inListings);
}
function updateSavedCount() {
  const el = $('#saved-count');
  if (el) el.textContent = state.saved.size;
}

/* ───────────────────────────── ROUTER ───────────────────────────── */
function parseRoute() {
  const h = (location.hash || '').replace(/^#\/?/, '');
  if (!h) return { view: 'explore', params: [] };
  const [view, ...params] = h.split('/');
  return { view, params };
}
function navigate(hash, opts) {
  if (opts && opts.replace) {
    history.replaceState(null, '', '#' + hash);
    render();
  } else {
    location.hash = hash;
  }
}
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', () => {
  updateSavedCount();
  render();
});

/* ───────────────────────────── RENDER DISPATCH ───────────────────────────── */
function setActiveSubnav(view) {
  $$('.subnav-tab').forEach(t => t.classList.toggle('active', t.dataset.route === view));
}

function render() {
  const { view, params } = parseRoute();
  const app = $('#app');
  const topLevel = ['explore','categories','vendors','saved'].includes(view) ? view : 'explore';
  setActiveSubnav(topLevel);

  const isDetail = view === 'product' || view === 'vendor';
  document.body.classList.toggle('is-detail', isDetail);

  window.scrollTo({ top: 0, behavior: 'instant' });

  if (view === 'product' && params[0]) {
    app.innerHTML = renderProductDetail(params[0]);
    bindProductDetail();
  } else if (view === 'vendor' && params[0]) {
    app.innerHTML = renderVendorDetail(params[0]);
    bindVendorDetail();
  } else if (view === 'categories') {
    app.innerHTML = renderCategoriesView();
    bindCategoriesView();
  } else if (view === 'vendors') {
    app.innerHTML = renderVendorsView();
    bindVendorsView();
  } else if (view === 'saved') {
    app.innerHTML = renderSavedView();
    bindExplore(true);
  } else {
    app.innerHTML = renderExploreView();
    bindExplore(false);

}

/* ───────────────────────────── EXPLORE VIEW ───────────────────────────── */
function filterProducts(products) {
  const q = state.search.trim().toLowerCase();
  return products.filter(p => {
    if (state.filterCategory && !p.categories.includes(state.filterCategory)) return false;
    if (state.filterStage && !(p.stages || []).includes(state.filterStage)) return false;
    if (state.filterRegion) {
      const dRegions = dealsByProduct(p.id).map(d => d.region);
      if (!dRegions.includes(state.filterRegion) && !dRegions.includes('Global')) return false;
    }
    if (!q) return true;
    const v = vendorOf(p);
    const hay = [
      p.name, p.short, p.long, (p.tags || []).join(' '),
      v ? v.name : '',
      ...dealsByProduct(p.id).map(d => d.title + ' ' + d.offerDescription),
    ].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function renderExploreView() {
  const products = filterProducts(PRODUCTS);
  return `
    ${renderToolbar()}
    ${renderActiveFilters()}
    <div class="results-meta"><strong>${products.length}</strong> product${products.length === 1 ? '' : 's'}${state.search ? ` matching "${escape(state.search)}"` : ''}</div>
    ${products.length === 0
      ? renderEmpty('No products match your filters', 'Try clearing a filter or searching for something else.', `<button class="btn secondary sm" data-action="clear-filters">Clear filters</button>`)
      : state.view === 'grid'
        ? `<div class="product-grid">${products.map(productCard).join('')}</div>`
        : `<div class="product-list">${products.map(productRow).join('')}</div>`
    }
  `;
}

function renderToolbar() {

          <option value="">All categories</option>

        </select>
      </div>
      <div class="filter-select-wrap">
        <select id="f-stage" class="filter-select ${state.filterStage ? 'has-value' : ''}">
          <option value="">All stages</option>
          ${STAGES.map(s => `<option value="${s}" ${state.filterStage === s ? 'selected' : ''}>${escape(s)}</option>`).join('')}
        </select>
      </div>
      <div class="filter-select-wrap">
        <select id="f-region" class="filter-select ${state.filterRegion ? 'has-value' : ''}">
          <option value="">All regions</option>
          ${REGIONS.map(r => `<option value="${r}" ${state.filterRegion === r ? 'selected' : ''}>${escape(r)}</option>`).join('')}

        <button class="${state.view === 'list' ? 'active' : ''}" data-view="list" title="List view" aria-label="List view">${icon('i-list')}</button>
      </div>
    </div>

}

function renderActiveFilters() {
  const chips = [];
  if (state.filterCategory) chips.push({ k: 'category', label: catName(state.filterCategory) });
  if (state.filterStage)    chips.push({ k: 'stage',    label: state.filterStage });
  if (state.filterRegion)   chips.push({ k: 'region',   label: state.filterRegion });
  if (chips.length === 0) return '';
  return `
    <div class="active-filters">
      <span class="lab">Filtered by:</span>
      ${chips.map(c => `
        <span class="filter-chip">${escape(c.label)}
          <button class="x" data-clear="${c.k}" aria-label="Remove ${escape(c.label)} filter">${icon('i-x')}</button>
        </span>

function shortenDeal(title) {
  if (title.length <= 32) return title;
  return title.slice(0, 30).trim() + '…';
}

function renderEmpty(title, desc, action) {
  return `
    <div class="empty">
      <div class="red-line"></div>
      <div class="ic">${icon('i-package')}</div>
      <h3 class="ttl">${escape(title)}</h3>
      <p class="desc">${escape(desc)}</p>
      ${action || ''}
    </div>
  `;
}

function bindExplore(isSavedView) {
  const searchEl = $('#search');
  if (searchEl) {
    searchEl.addEventListener('input', (e) => {
      state.search = e.target.value;
      const meta = $('.results-meta');
      const grid = $('.product-grid') || $('.product-list');
      // Re-render only the list to preserve input focus
      const products = filterProducts(isSavedView ? PRODUCTS.filter(p => state.saved.has(p.id)) : PRODUCTS);
      if (meta) meta.innerHTML = `<strong>${products.length}</strong> product${products.length === 1 ? '' : 's'}${state.search ? ` matching "${escape(state.search)}"` : ''}`;
      if (grid) {
        if (products.length === 0) {
          grid.outerHTML = renderEmpty('No products match your filters', 'Try clearing a filter or searching for something else.', `<button class="btn secondary sm" data-action="clear-filters">Clear filters</button>`);
        } else {
          grid.outerHTML = state.view === 'grid'
            ? `<div class="product-grid">${products.map(productCard).join('')}</div>`
            : `<div class="product-list">${products.map(productRow).join('')}</div>`;
        }
      } else {
        // Was empty; check if now has results
        if (products.length > 0) {
          const empty = $('.empty');
          if (empty) empty.outerHTML = state.view === 'grid'
            ? `<div class="product-grid">${products.map(productCard).join('')}</div>`
            : `<div class="product-list">${products.map(productRow).join('')}</div>`;
        }
      }
    });
  }

  const fc = $('#f-cat'),    fs = $('#f-stage'), fr = $('#f-region');
  if (fc) fc.addEventListener('change', (e) => { state.filterCategory = e.target.value; render(); });
  if (fs) fs.addEventListener('change', (e) => { state.filterStage    = e.target.value; render(); });
  if (fr) fr.addEventListener('change', (e) => { state.filterRegion   = e.target.value; render(); });

  $$('.view-toggle button').forEach(b => b.addEventListener('click', () => {
    state.view = b.dataset.view;
    render();
  }));

  $$('[data-clear]').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    const k = b.dataset.clear;
    if (k === 'category') state.filterCategory = '';
    if (k === 'stage')    state.filterStage = '';
    if (k === 'region')   state.filterRegion = '';
    render();
  }));

  $$('[data-action="clear-filters"]').forEach(b => b.addEventListener('click', () => {
    state.filterCategory = ''; state.filterStage = ''; state.filterRegion = '';
    render();
  }));

  bindCardCommon();
}

}

function bindVendorDetail() {
  bindCardCommon();
  $$('[data-nav]').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    navigate(b.dataset.nav);
  }));
  $$('[data-product-link]').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    navigate('product/' + b.dataset.productLink);
  }));
  $$('[data-action="go-vendors"]').forEach(b => b.addEventListener('click', () => navigate('vendors')));
}

/* ───────────────────────────── COMMON CARD BINDINGS ───────────────────────────── */
function bindCardCommon() {
  // Save buttons
  $$('[data-save]').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = btn.dataset.save;
    const wasSaved = state.saved.has(id);
    setSaved(id, !wasSaved);
    const p = byId(PRODUCTS, id);
    toast(
      wasSaved ? 'Removed from Saved' : 'Saved',
      wasSaved ? `${p.name} is no longer in your saved list.` : `${p.name} added to your saved products.`,
      'info'
    );
    // Soft re-render — preserve search input focus by limiting to swapping affected card
    softRefreshAfterSaveOrListing(id);
  }));

  // Add to Listings buttons
  $$('[data-add-listing]').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = btn.dataset.addListing;
    if (state.inListings.has(id)) return;
    setInListings(id);
    const p = byId(PRODUCTS, id);
    toast('Added to listings', `${p.name} is now in your listings — open the Listings module to publish it.`, 'success');
    softRefreshAfterSaveOrListing(id);
  }));

  // Card click → product detail (use event delegation to avoid interfering with inner buttons)
  $$('[data-product]').forEach(c => {
    const goTo = (e) => {
      // Don't navigate when clicking a child button
      if (e.target.closest('button')) return;
      navigate('product/' + c.dataset.product);
    };
    c.addEventListener('click', goTo);
    c.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        if (e.target.closest('button')) return;
        e.preventDefault();
        navigate('product/' + c.dataset.product);
      }
    });
  });

  // Go-explore action
  $$('[data-action="go-explore"]').forEach(b => b.addEventListener('click', () => navigate('explore')));
}

function softRefreshAfterSaveOrListing(productId) {
  // Re-render current view, but only the relevant parts to keep scroll/focus
  const { view } = parseRoute();
  if (view === 'product') {
    // Re-render product detail to update buttons
    render();
  } else {
    // For lists, re-render the card(s) in place
    $$(`[data-product="${productId}"]`).forEach(el => {
      const isRow = el.classList.contains('prod-row');
      const p = byId(PRODUCTS, productId);
      const html = isRow ? productRow(p) : productCard(p);
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;
      const fresh = wrapper.firstElementChild;
      el.replaceWith(fresh);
      // Re-bind on the new node only
      rebindOne(fresh);
    });
    updateSavedCount();
    // Also update Saved view if currently there and item was un-saved
    if (view === 'saved' && !state.saved.has(productId)) {
      render();
    }
  }
}

function rebindOne(el) {
  el.querySelectorAll('[data-save]').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = btn.dataset.save;
    const wasSaved = state.saved.has(id);
    setSaved(id, !wasSaved);
    const p = byId(PRODUCTS, id);
    toast(
      wasSaved ? 'Removed from Saved' : 'Saved',
      wasSaved ? `${p.name} is no longer in your saved list.` : `${p.name} added to your saved products.`,
      'info'
    );
    softRefreshAfterSaveOrListing(id);
  }));
  el.querySelectorAll('[data-add-listing]').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = btn.dataset.addListing;
    if (state.inListings.has(id)) return;
    setInListings(id);
    const p = byId(PRODUCTS, id);
    toast('Added to listings', `${p.name} is now in your listings — open the Listings module to publish it.`, 'success');
    softRefreshAfterSaveOrListing(id);
  }));
  const goTo = (e) => {
    if (e.target.closest('button')) return;
    navigate('product/' + el.dataset.product);
  };
  el.addEventListener('click', goTo);
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      if (e.target.closest('button')) return;
      e.preventDefault();
      navigate('product/' + el.dataset.product);
    }
  });
}

/* ───────────────────────────── SUB-NAV BINDING ───────────────────────────── */
$$('.subnav-tab').forEach(t => t.addEventListener('click', () => navigate(t.dataset.route)));

/* ───────────────────────────── TOAST ───────────────────────────── */
function toast(title, desc, type) {
  const host = $('#toast-host');
  if (!host) return;
  const el = document.createElement('div');
  el.className = 'toast ' + (type === 'info' ? 'info' : 'success');
  el.innerHTML = `
    <span class="ic">${icon(type === 'info' ? 'i-bookmark' : 'i-check')}</span>
    <div class="body">
      <div class="t">${escape(title)}</div>
      <div class="d">${escape(desc)}</div>
    </div>
    <button class="x" aria-label="Dismiss">${icon('i-x')}</button>
  `;
  host.appendChild(el);
  const close = () => {
    el.classList.add('removing');
    setTimeout(() => el.remove(), 200);
  };
  el.querySelector('.x').addEventListener('click', close);
  setTimeout(close, 3600);
}
</script>
